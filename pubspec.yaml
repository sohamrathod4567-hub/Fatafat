name: billing_app
description: An offline-first billing app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.0
  provider: ^6.0.5
  sqflite: ^2.3.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#22C55E"
  adaptive_icon_foreground: assets/icon.png
  web:
    generate: true
    image_path: assets/icon.png
    background_color: "#22C55E"
    theme_color: "#22C55E"

flutter_native_splash:
  color: "#22C55E"
  image: assets/icon.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#22C55E"
    image: assets/icon.png
